<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>初めてのwebページ</title>
    </head>
    <body>
        <!-- 見出し -->
        <h1>大見出し</h1>
        <h2>中見出し</h2>
        <h3>小見出し</h3>

        <!-- 段落 -->
        <p>これは段落です。文章を書くときに使います。</p>

        <!-- リスト -->
        <ul>
            <li>りんご</li>
            <li>バナナ</li>
            <li>みかん</li>
        </ul>

        <!-- 番号付きリスト -->
        <ol>
            <li>第一位</li>
            <li>第二位</li>
            <li>第三位</li>
        </ol>

        <!-- リンク -->
        <a href="https://google.com">google</a>

        <!-- 画像 -->
        <img src="https://placehold.co/300x200" alt="サンプル画像">

        <!-- 区切り線 -->
        <hr>

        <!-- 改行 -->
        <p>1行目<br>2行目</p>

    </body>
</html>
